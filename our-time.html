<html lang="en">

    <meta charset="UTF-8">

<body class="our-time-page" data-chapter="8">
<div id="header"></div>

<div class="stars"></div>

<section class="our-time-container">

    <div class="time-heart">❤️</div>

    <h1>Every Second With You</h1>

    <p class="time-subtitle">

    <div class="time-counter">

        <div class="time-card">
            <span id="years">0</span>
            <small>Years</small>
        </div>

        <div class="time-card">
            <span id="months">0</span>
            <small>Months</small>
        </div>

        <div class="time-card">
            <span id="weeks">0</span>
            <small>Weeks</small>
        </div>

        <div class="time-card">
            <span id="days">0</span>
            <small>Days</small>
        </div>

        <div class="time-card">
            <span id="hours">0</span>
            <small>Hours</small>
        </div>

        <div class="time-card">
            <span id="minutes">0</span>
            <small>Minutes</small>
        </div>

        <div class="time-card">
            <span id="seconds">0</span>
            <small>Seconds</small>
        </div>

    </div>

    <blockquote>
        "Every second with you has been worth it…
        and I can't wait to spend millions more with you. ❤️"

    <a class="next-btn" href="surprise.html">
